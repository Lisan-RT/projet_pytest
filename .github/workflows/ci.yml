name: Mon Premier Test Automatique
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Installer Pytest
        run: pip install pytest
      - name: Lancer Pytest
        run: pytest